<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Postagens</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.top{display:flex;align-items:center}
.avatar{width:40px;height:40px;border-radius:50%;margin-right:10px}
.name{font-weight:bold}
.verify{color:blue;margin-left:5px}
textarea{width:100%;padding:10px;border-radius:8px}
button{padding:8px 12px;margin-top:5px;border:none;border-radius:6px;background:#007bff;color:#fff;cursor:pointer}
img.post{width:100%;border-radius:10px;margin-top:10px}
.actions{margin-top:10px}
</style>
</head>
<body>
<div class="container">

<h2>Criar Postagem</h2>
<div class="card">
<textarea id="content" placeholder="O que estás a pensar?"></textarea>
<br>
<button onclick="createPost()">Publicar</button>
</div>

<h2>Postagens</h2>
<div id="posts"></div>

</div>

<script>
const API = 'http://localhost:3000/posts';
const token = localStorage.getItem('token');

function verifyBadge(name){
  if(name === 'MCA01' || name === 'MACKM01') return '✔️';
  if(name === 'MCAPRO') return '⭐';
  return '';
}

async function loadPosts(){
  const res = await fetch(API);
  const data = await res.json();
  const container = document.getElementById('posts');
  container.innerHTML = '';

  data.forEach(p=>{
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="top">
        <img class="avatar" src="${p.avatar || 'https://via.placeholder.com/40'}">
        <div>
          <span class="name">${p.author}</span>
          <span class="verify">${verifyBadge(p.author)}</span>
          <div style="font-size:12px;color:gray">${p.time}</div>
        </div>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img class="post" src="${p.image}">` : ''}
      <div class="actions">
        ❤️ ${p.likes}
        💬 ${p.comments}
        <br>
        <button onclick="likePost(${p.id})">Like</button>
        <button onclick="deletePost(${p.id})">Apagar</button>
      </div>
    `;

    container.appendChild(div);
  });
}

async function createPost(){
  const content = document.getElementById('content').value;
  await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({content})
  });
  document.getElementById('content').value='';
  loadPosts();
}

async function likePost(id){
  await fetch(`${API}/${id}/like`,{
    method:'POST',
    headers:{'Authorization':'Bearer '+token}
  });
  loadPosts();
}

async function deletePost(id){
  await fetch(`${API}/${id}`,{
    method:'DELETE',
    headers:{'Authorization':'Bearer '+token}
  });
  loadPosts();
}

loadPosts();
</script>

</body>
</html>
